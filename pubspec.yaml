name: unite_fp
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.1
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.4.0
  image_picker: ^1.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700

    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
          weight: 700

    - family: RobotoCustom
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700



  assets:
    - assets/images/teamwork.png
    - assets/images/join_club.png
    - assets/images/create_club.png
    - assets/images/dash.png
    - assets/icons/email.png
    - assets/icons/lock.png
    - assets/icons/user.png
    - assets/icons/lock_off.png
    - assets/icons/edit.png
    - assets/icons/task.png
    - assets/icons/task1.png
    - assets/icons/calendar (2).png
    - assets/icons/profile (2).png
    - assets/icons/announcement (2).png
    - assets/icons/settings (2).png
    - assets/vectors/top_curve.png
    - assets/vectors/bottom_curve.png
    - assets/vectors/top_circles.png
